name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  # Build and test on multiple platforms
  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release, Debug]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Cache CPR build
      if: matrix.os == 'ubuntu-latest'
      uses: actions/cache@v4
      id: cache-cpr
      with:
        path: /tmp/cpr-install
        key: cpr-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}-v2
    
    - name: Clean old CPR install (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo rm -rf /usr/local/include/cpr /usr/local/lib/cmake/cpr /usr/local/lib/libcpr.*
        sudo find /usr/local/lib/ -name "*cpr*" -exec rm -rf {} + 2>/dev/null || true
        rm -rf build CMakeCache.txt CMakeFiles

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y nlohmann-json3-dev cmake build-essential libcurl4-openssl-dev
        
        # Build CPR from source if not cached
        if [ "${{ steps.cache-cpr.outputs.cache-hit }}" != "true" ]; then
          # Clean any existing CPR build
          rm -rf /tmp/cpr /tmp/cpr-install
          git clone --depth=1 https://github.com/libcpr/cpr.git /tmp/cpr
          cd /tmp/cpr
          cmake -S . -B build -DCPR_USE_SYSTEM_CURL=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/tmp/cpr-install -DBUILD_CPR_TESTS=OFF
          cmake --build build --parallel
          cmake --install build
        fi
        
        # Install CPR and refresh linker cache
        sudo cp -r /tmp/cpr-install/* /usr/local/
        sudo ldconfig
    
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cpr nlohmann-json cmake
    
    - name: Configure CMake
      run: |
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_PREFIX_PATH=/usr/local
        else
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        fi
    
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: Run preflight checks
      run: CI=true ./package/scripts/preflight.sh
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llamaware-agent-${{ matrix.os }}-${{ matrix.build_type }}
        path: build/bin/llamaware-agent*

  # Security and code quality checks
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
    
    - name: Cache CPR build
      uses: actions/cache@v4
      id: cache-cpr-security
      with:
        path: /tmp/cpr-install
        key: cpr-security-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}-v2
    
    - name: Clean old CPR install (Security)
      run: |
        sudo rm -rf /usr/local/include/cpr /usr/local/lib/cmake/cpr /usr/local/lib/libcpr.*
        sudo find /usr/local/lib/ -name "*cpr*" -exec rm -rf {} + 2>/dev/null || true
        rm -rf build CMakeCache.txt CMakeFiles

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y nlohmann-json3-dev cmake build-essential libcurl4-openssl-dev
        
        # Build CPR from source if not cached
        if [ "${{ steps.cache-cpr-security.outputs.cache-hit }}" != "true" ]; then
          # Clean any existing CPR build
          rm -rf /tmp/cpr /tmp/cpr-install
          git clone --depth=1 https://github.com/libcpr/cpr.git /tmp/cpr
          cd /tmp/cpr
          cmake -S . -B build -DCPR_USE_SYSTEM_CURL=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/tmp/cpr-install -DBUILD_CPR_TESTS=OFF
          cmake --build build --parallel
          cmake --install build
        fi
        
        # Install CPR and refresh linker cache
        sudo cp -r /tmp/cpr-install/* /usr/local/
        sudo ldconfig
    
    - name: Build for analysis
      run: |
        cmake -S . -B build -DCMAKE_PREFIX_PATH=/usr/local
        cmake --build build
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # Package creation and distribution
  package:
    name: Create Packages
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Cache CPR build
      uses: actions/cache@v4
      id: cache-cpr-package
      with:
        path: /tmp/cpr-install
        key: cpr-package-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}-v2
    
    - name: Clean old CPR install (Package)
      run: |
        sudo rm -rf /usr/local/include/cpr /usr/local/lib/cmake/cpr /usr/local/lib/libcpr.*
        sudo find /usr/local/lib/ -name "*cpr*" -exec rm -rf {} + 2>/dev/null || true
        rm -rf build CMakeCache.txt CMakeFiles

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y nlohmann-json3-dev cmake build-essential libcurl4-openssl-dev
        
        # Build CPR from source if not cached
        if [ "${{ steps.cache-cpr-package.outputs.cache-hit }}" != "true" ]; then
          # Clean any existing CPR build
          rm -rf /tmp/cpr /tmp/cpr-install
          git clone --depth=1 https://github.com/libcpr/cpr.git /tmp/cpr
          cd /tmp/cpr
          cmake -S . -B build -DCPR_USE_SYSTEM_CURL=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/tmp/cpr-install -DBUILD_CPR_TESTS=OFF
          cmake --build build --parallel
          cmake --install build
        fi
        
        # Install CPR and refresh linker cache
        sudo cp -r /tmp/cpr-install/* /usr/local/
        sudo ldconfig
    
    - name: Build release
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/usr/local
        cmake --build build
    
    - name: Create packages
      run: |
        make package
        cd build && cpack
    
    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./package/dist/llamaware-agent
        asset_name: llamaware-agent-linux-x64
        asset_content_type: application/octet-stream

  # Docker image build and push
  docker:
    name: Build Docker Image
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: llamaware/agent
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./package/docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deployment to staging/production
  deploy:
    name: Deploy
    needs: [package, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: production
    
    steps:
    - name: Deploy to production
      run: |
        echo "Deploying Llamaware Agent v${{ github.event.release.tag_name }}"
        # Add your deployment commands here
        # e.g., kubectl apply, docker-compose up, etc.